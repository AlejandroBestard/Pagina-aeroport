<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aeroport de Palma - PMI</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- capçelera -->
    <header>
        <div class="header-esquerra">
            <div>
                <h1>Aeroport de Palma</h1>
                <p class="subtitol">Son Sant Joan · PMI</p>
            </div>
        </div>
        <div class="header-dreta">
            <div class="rellotge" id="rellotge">00:00:00</div>
            <div class="data" id="data-avui"></div>
        </div>
    </header>
    <nav>
        <a href="#vols" class="actiu">Vols</a>
        <a href="#serveis">Serveis</a>
        <a href="#informacio">Informació</a>
    </nav>
    <!-- seccio vols -->
  <section id="vols">
    <div class="contenidor">

      <!-- pagina de  vols sortiedes/arribades -->
      <div class="tabs">
        <button class="tab actiu-tab" id="btn-sortides" onclick="canviarTab('sortides')">
          ↑ Sortides
        </button>
        <button class="tab" id="btn-arribades" onclick="canviarTab('arribades')">
          ↓ Arribades
        </button>
      </div>
      <!-- FILTROS -->
      <div class="filtres">
        <div class="cerca-container">
          <input
            type="text"
            id="cerca"
            placeholder="Cerca destí o origen..."
            oninput="filtrarVols()"
          />
        </div>
        <div class="botons-estat">
          <button class="btn-estat actiu-estat" onclick="filtrarPerEstat('tots', this)">Tots</button>
          <button class="btn-estat" onclick="filtrarPerEstat('A temps', this)">A temps</button>
          <button class="btn-estat" onclick="filtrarPerEstat('Retardat', this)">Retardat</button>
          <button class="btn-estat" onclick="filtrarPerEstat('Embarcant', this)">Embarcant</button>
          <button class="btn-estat" onclick="filtrarPerEstat('Cancel·lat', this)">Cancel·lat</button>
        </div>
      </div>


    <script src="/JavaScript/Script.js"></script>
</body>

</html>
